name: Deploy Backend Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ap-south-1

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get backend instance details
        id: get-instance
        run: |
          # Find backend instance
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=sabpaisa-backend-${{ github.event.inputs.environment }}" \
              "Name=tag:Type,Values=backend" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "❌ Backend instance not found!"
            exit 1
          fi
          
          echo "Found instance: $INSTANCE_ID"
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          
          # Get instance IP
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo "Public IP: $PUBLIC_IP"
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
      
      - name: Get database credentials
        run: |
          # Get RDS endpoint
          DB_HOST=$(aws rds describe-db-instances \
            --db-instance-identifier sabpaisa-tokenization-${{ github.event.inputs.environment }} \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)
          
          # Get password from Secrets Manager
          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id sabpaisa-tokenization-${{ github.event.inputs.environment }}-db-password \
            --query SecretString \
            --output text)
          
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
      
      - name: Update application properties
        run: |
          # Create application-dev.yml
          cat > src/main/resources/application-${{ github.event.inputs.environment }}.yml << EOF
          spring:
            profiles:
              active: ${{ github.event.inputs.environment }}
            datasource:
              url: jdbc:postgresql://${{ env.DB_HOST }}:5432/sabpaisa_tokenization
              username: postgres
              password: ${{ env.DB_PASSWORD }}
              driver-class-name: org.postgresql.Driver
              hikari:
                maximum-pool-size: 10
                minimum-idle: 5
                connection-timeout: 30000
            jpa:
              hibernate:
                ddl-auto: validate
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.PostgreSQLDialect
                  default_schema: tokenization
              show-sql: false
          
          server:
            port: 8080
            servlet:
              context-path: /api
          
          tokenization:
            encryption:
              algorithm: AES
              key-size: 256
            jwt:
              secret: \${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
              expiration: 86400000
          
          logging:
            level:
              com.sabpaisa: INFO
              org.springframework.web: INFO
          
          management:
            endpoints:
              web:
                exposure:
                  include: health,info,metrics
            endpoint:
              health:
                show-details: always
          EOF
          
          # Also create a health check controller if not exists
          mkdir -p src/main/java/com/sabpaisa/tokenization/controller
          cat > src/main/java/com/sabpaisa/tokenization/controller/HealthController.java << 'JAVA'
          package com.sabpaisa.tokenization.controller;
          
          import org.springframework.web.bind.annotation.GetMapping;
          import org.springframework.web.bind.annotation.RestController;
          import java.util.HashMap;
          import java.util.Map;
          
          @RestController
          public class HealthController {
              
              @GetMapping("/health")
              public Map<String, String> health() {
                  Map<String, String> response = new HashMap<>();
                  response.put("status", "UP");
                  response.put("service", "sabpaisa-tokenization-backend");
                  response.put("timestamp", String.valueOf(System.currentTimeMillis()));
                  return response;
              }
          }
          JAVA
      
      - name: Build application
        run: |
          echo "Building application..."
          mvn clean package -DskipTests
          
          # Check if WAR was created
          if [ ! -f target/*.war ]; then
            echo "❌ WAR file not found!"
            exit 1
          fi
          
          echo "✅ Build successful"
          ls -la target/*.war
      
      - name: Upload WAR to S3
        run: |
          WAR_FILE=$(ls target/*.war | head -1)
          S3_PATH="s3://sabpaisa-artifacts/${{ github.event.inputs.environment }}/backend/app-$(date +%Y%m%d-%H%M%S).war"
          
          aws s3 cp "$WAR_FILE" "$S3_PATH"
          echo "S3_WAR_PATH=$S3_PATH" >> $GITHUB_ENV
          
          # Also upload as latest
          aws s3 cp "$WAR_FILE" "s3://sabpaisa-artifacts/${{ github.event.inputs.environment }}/backend/app-latest.war"
      
      - name: Deploy to EC2 instance
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          
          # Create deployment script
          cat > deploy-commands.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "Starting deployment..."
          
          # Download WAR from S3
          aws s3 cp s3://sabpaisa-artifacts/${{ github.event.inputs.environment }}/backend/app-latest.war /tmp/app.war
          
          # Stop Tomcat
          sudo systemctl stop tomcat || true
          
          # Backup current deployment
          if [ -f /opt/tomcat/webapps/ROOT.war ]; then
            sudo mv /opt/tomcat/webapps/ROOT.war /opt/tomcat/webapps/ROOT.war.backup
          fi
          
          # Clean up old deployments
          sudo rm -rf /opt/tomcat/webapps/ROOT
          sudo rm -f /opt/tomcat/webapps/ROOT.war
          
          # Deploy new WAR
          sudo cp /tmp/app.war /opt/tomcat/webapps/ROOT.war
          sudo chown tomcat:tomcat /opt/tomcat/webapps/ROOT.war
          
          # Start Tomcat
          sudo systemctl start tomcat
          
          # Wait for application to start
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "✅ Application is healthy!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          
          # Final health check
          curl -f http://localhost:8080/api/health || exit 1
          
          echo "✅ Deployment completed successfully!"
          EOF
          
          # Send deployment commands via SSM
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters file://deploy-commands.sh \
            --output text \
            --query "Command.CommandId")
          
          echo "Deployment command sent: $COMMAND_ID"
          
          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID || true
          
          # Get command result
          STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "Status" \
            --output text)
          
          echo "Deployment status: $STATUS"
          
          if [ "$STATUS" = "Success" ]; then
            echo "✅ Backend deployed successfully!"
          else
            echo "❌ Deployment failed!"
            
            # Get error details
            aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --query "StandardErrorContent" \
              --output text
            
            exit 1
          fi
      
      - name: Verify deployment
        run: |
          PUBLIC_IP="${{ steps.get-instance.outputs.public_ip }}"
          
          echo "Verifying deployment..."
          sleep 10
          
          # Test health endpoint
          if curl -f http://$PUBLIC_IP:8080/api/health; then
            echo ""
            echo "✅ Backend is healthy and running!"
          else
            echo "❌ Health check failed!"
            exit 1
          fi
          
          # Create summary
          echo "## Backend Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Instance Details" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- Instance ID: ${{ steps.get-instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Public IP: $PUBLIC_IP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://$PUBLIC_IP:8080/api/health" >> $GITHUB_STEP_SUMMARY
          echo "- API Base: http://$PUBLIC_IP:8080/api" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test with:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "curl http://$PUBLIC_IP:8080/api/health" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY