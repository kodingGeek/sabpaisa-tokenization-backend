name: Deploy Backend Application to EC2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ap-south-1
  JAVA_VERSION: 17

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: 'maven'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get database configuration
        id: db-config
        run: |
          echo "🔍 Getting database configuration..."
          
          # Get RDS endpoint
          DB_HOST=$(aws rds describe-db-instances \
            --db-instance-identifier sabpaisa-tokenization-${{ github.event.inputs.environment }} \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)
          
          if [ "$DB_HOST" = "None" ] || [ -z "$DB_HOST" ]; then
            echo "❌ Database not found!"
            exit 1
          fi
          
          echo "✅ Database host: $DB_HOST"
          echo "db_host=$DB_HOST" >> $GITHUB_OUTPUT
          
          # Get password from Secrets Manager
          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id sabpaisa-tokenization-${{ github.event.inputs.environment }}-db-password \
            --query SecretString \
            --output text)
          
          echo "::add-mask::$DB_PASSWORD"
          echo "db_password=$DB_PASSWORD" >> $GITHUB_OUTPUT
      
      - name: Create application properties
        run: |
          echo "📝 Creating application properties..."
          
          mkdir -p src/main/resources
          
          cat > src/main/resources/application-${{ github.event.inputs.environment }}.yml << EOF
          spring:
            profiles:
              active: ${{ github.event.inputs.environment }}
            datasource:
              url: jdbc:postgresql://${{ steps.db-config.outputs.db_host }}:5432/sabpaisa_tokenization
              username: postgres
              password: ${{ steps.db-config.outputs.db_password }}
              driver-class-name: org.postgresql.Driver
              hikari:
                maximum-pool-size: 10
                minimum-idle: 2
                connection-timeout: 30000
            jpa:
              hibernate:
                ddl-auto: validate
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.PostgreSQLDialect
                  default_schema: tokenization
              show-sql: false
          
          server:
            port: 8080
            servlet:
              context-path: /api
          
          tokenization:
            encryption:
              algorithm: AES
              key-size: 256
          
          logging:
            level:
              com.sabpaisa: INFO
              org.springframework: INFO
          
          management:
            endpoints:
              web:
                exposure:
                  include: health,info
            endpoint:
              health:
                show-details: always
          EOF
          
          echo "✅ Application properties created"
      
      - name: Build application
        run: |
          echo "🔨 Building application..."
          mvn clean package -DskipTests
          
          # Verify WAR was created
          if [ ! -f target/*.war ]; then
            echo "❌ Build failed - WAR file not found!"
            exit 1
          fi
          
          WAR_FILE=$(ls target/*.war | head -1)
          echo "✅ Build successful: $WAR_FILE"
          
          # Display build info
          ls -lh target/*.war
      
      - name: Deploy to EC2
        run: |
          echo "🚀 Starting deployment..."
          chmod +x deploy-pipeline.sh
          ./deploy-pipeline.sh ${{ github.event.inputs.environment }}
      
      - name: Deployment Summary
        if: success()
        run: |
          # Get instance details for summary
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=sabpaisa-backend-${{ github.event.inputs.environment }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          echo "## ✅ Backend Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance ID**: $INSTANCE_ID" >> $GITHUB_STEP_SUMMARY
          echo "- **Public IP**: $PUBLIC_IP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Check**: http://$PUBLIC_IP:8080/api/health" >> $GITHUB_STEP_SUMMARY
          echo "- **API Base**: http://$PUBLIC_IP:8080/api" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Health check" >> $GITHUB_STEP_SUMMARY
          echo "curl http://$PUBLIC_IP:8080/api/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Tokenization (requires API key)" >> $GITHUB_STEP_SUMMARY
          echo 'curl -X POST http://'$PUBLIC_IP':8080/api/v1/tokenize \' >> $GITHUB_STEP_SUMMARY
          echo '  -H "Content-Type: application/json" \' >> $GITHUB_STEP_SUMMARY
          echo '  -H "X-API-Key: your-api-key" \' >> $GITHUB_STEP_SUMMARY
          echo '  -d '"'"'{"pan": "4111111111111111"}'"'"'' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY